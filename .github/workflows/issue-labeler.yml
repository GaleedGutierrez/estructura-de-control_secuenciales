---
name: "🔖 Issue Labeler"
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      # May not be the latest version
      - uses: github/issue-labeler@v3.4
        with:
          configuration-path: .github/issue-label.yml
          not-before: 2020-01-15T02:54:32Z
          enable-versioned-regex: 0
          include-title: 1
          repo-token: ${{ github.token }}
