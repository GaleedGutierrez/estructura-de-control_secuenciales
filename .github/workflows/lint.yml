---
name: 💅 Lint
on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Ruff + Pylint
    runs-on: ubuntu-latest

    steps:
      - name: "👍 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # O la que estés usando en la facultad
          cache: "pip" # Cachea las dependencias para que sea más rápido

      - name: "📥 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint
          # Si tienes un requirements.txt, descomenta la siguiente línea:
          # pip install -r requirements.txt

      - name: "⚡ Ruff Check (Linter)"
        run: ruff check .

      - name: "📐 Ruff Format (Prettier equivalent)"
        run: ruff format --check .

      - name: "🕵️ Pylint"
        run: |
          # Pylint necesita ver las dependencias instaladas para funcionar bien
          pylint $(git ls-files '*.py')

  build:
    name: 🐍 Python Super Linter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: 👍 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Eliminamos el paso de npm ci ya que es para JS/TS

      - name: 💐 Super-linter
        uses: super-linter/super-linter@v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- CONFIGURACIÓN DE PYTHON ---
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_PYTHON_RUFF: true

          # Desactivamos otros linters de Python para que no hagan ruido
          # ya que Ruff se encarga de casi todo (Black, Isort, Flake8)
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: true # Muy recomendado para Data Science con tipos
