---
name: 💅 Lint
on:
  push: null
  pull_request: null

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Ruff + Pylint
    runs-on: ubuntu-latest

    steps:
      - name: "👍 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v6
        with:
          # O la que estés usando en la facultad
          python-version: "3.12"
          # Cachea las dependencias para que sea más rápido
          cache: "pip"

      - name: "📥 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint
          # Si tienes un requirements.txt, descomenta la siguiente línea:
          # pip install -r requirements.txt

      - name: "⚡ Ruff Check (Linter)"
        run: ruff check .

      - name: "📐 Ruff Format (Prettier equivalent)"
        run: ruff format --check .

      - name: "🕵️ Pylint"
        run: |
          # Pylint necesita ver las dependencias instaladas para funcionar bien
          git ls-files '*.py' | xargs pylint

  build:
    name: 🐍 Python Super Linter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: 👍 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Eliminamos el paso de npm ci ya que es para JS/TS

      - name: 💐 Super-linter
        uses: super-linter/super-linter@v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- ESTRATEGIA DE INCLUSIÓN ---
          # Al poner estos en true, Super-Linter entiende que
          # DEBE IGNORAR todo lo demás automáticamente.
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_PYTHON_RUFF: true

          # Opcional: si quieres que revise tus archivos de GitHub Actions
          VALIDATE_GITHUB_ACTIONS: true

          # Activa el linter de Ansible
          VALIDATE_ANSIBLE: true
          VALIDATE_YAML: true

          # Solo valida los archivos que cambiaste en este push/PR
          VALIDATE_ALL_CODEBASE: false
